<h3 style="margin-top:24px;">交互说明</h3>
<div class="section">
  <p><strong>① 展开动画</strong> — FAB 图标旋转 45° 变为 ×，菜单项从下往上依次出现</p>
  <p><strong>② 类型选项</strong> — 密码、🔐私钥、📝安全笔记、📎其他</p>
  <p><strong>③ 用户自定义类型</strong> — 也将显示在此菜单中</p>
  <p><strong>④ 关闭方式</strong> — 点击背景或再次点击 FAB</p>
</div>

<div class="options" style="margin-top:24px;">
  <div class="option" data-choice="settings" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>设置页</h3>
      <p>查看设置页面布局</p>
    </div>
  </div>
  <div class="option" data-choice="custom-type" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>自定义类型创建</h3>
      <p>查看用户如何创建自定义类型</p>
    </div>
  </div>
  <div class="option" data-choice="approved" onclick="toggleSelect(this)">

    <div class="content">
      <h3>设计符合预期</h3>
      <p>继续下一个部分</p>
    </div>
  </div>
</div>
